name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run check
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: codetrail-${{ matrix.os }}
          path: codetrail.vsix
          if-no-files-found: error
